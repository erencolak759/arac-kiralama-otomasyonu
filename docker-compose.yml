version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: drivefleet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: arac_kiralama
      POSTGRES_USER: drivefleet
      POSTGRES_PASSWORD: drivefleet123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivefleet -d arac_kiralama"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
